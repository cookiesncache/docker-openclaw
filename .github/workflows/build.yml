name: build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'root/**'
      - '.dockerignore'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up upstream openclaw:latest + base-image updates.
    - cron: '0 6 * * 1'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/openclaw
  UPSTREAM: ghcr.io/openclaw/openclaw:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata + upstream version
        id: meta
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          docker pull -q "$UPSTREAM"
          # Resolve the upstream OpenClaw version (for a pinnable tag). Try the CLI,
          # then package.json, then an OCI label; leave blank if none can be read.
          VER=$(timeout 30 docker run --rm --entrypoint node "$UPSTREAM" /app/openclaw.mjs --version 2>/dev/null \
                | grep -oiE '[0-9]{4}\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$VER" ]; then
            VER=$(docker run --rm --entrypoint cat "$UPSTREAM" /app/package.json 2>/dev/null \
                  | grep -oE '[0-9]{4}\.[0-9]+\.[0-9]+' | head -1 || true)
          fi
          if [ -z "$VER" ]; then
            VER=$(docker inspect "$UPSTREAM" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' 2>/dev/null || true)
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Upstream OpenClaw version: ${VER:-unknown}"

      - name: Compute tags
        id: tags
        run: |
          TAGS="${IMAGE}:latest,${IMAGE}:${{ steps.meta.outputs.sha }}"
          if [ -n "${{ steps.meta.outputs.version }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ steps.meta.outputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false          # single-arch image, not a manifest list (cleaner for Unraid)
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VERSION=${{ steps.meta.outputs.version || steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
