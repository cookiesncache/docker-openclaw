name: build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'root/**'
      - '.dockerignore'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  schedule:
    # Weekly rebuild to pick up upstream openclaw:latest + base-image updates.
    - cron: '0 6 * * 1'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false          # single-arch image, not a manifest list (cleaner for Unraid)
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.date }}
            VERSION=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
