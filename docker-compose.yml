---
services:
  openclaw:
    build: .
    image: openclaw:lsio
    container_name: openclaw
    environment:
      # Unraid: PUID=99 / PGID=100 (nobody:users) so it matches appdata ownership.
      # Standard Linux host: PUID=1000 / PGID=1000.
      - PUID=99
      - PGID=100
      - UMASK=022
      - TZ=America/New_York
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Auth posture. Default true: gateway runs HTTP behind a TLS terminator (Tailscale serve /
      # reverse proxy). Set false only to require HTTPS at the gateway itself.
      - OPENCLAW_ALLOW_INSECURE_AUTH=true
      # Optional extra provider keys / bot tokens (set in .env if used):
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    volumes:
      - ./config:/config
    ports:
      - 18789:18789
    restart: unless-stopped
