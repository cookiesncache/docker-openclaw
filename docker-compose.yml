---
services:
  openclaw:
    build: .
    image: openclaw:lsio
    container_name: openclaw
    environment:
      # Unraid: PUID=99 / PGID=100 (nobody:users) so it matches appdata ownership.
      # Standard Linux host: PUID=1000 / PGID=1000.
      - PUID=99
      - PGID=100
      - UMASK=022
      - TZ=America/New_York
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Auth over plain HTTP. Default true for direct LAN-HTTP access; set false (recommended)
      # behind a TLS terminator (Tailscale serve / reverse proxy), opening the UI via its https URL.
      - OPENCLAW_ALLOW_INSECURE_AUTH=true
      # Control UI allowed origins (CSRF protection). Set to the URL you reach the UI from,
      # e.g. https://openclaw.YOUR-TAILNET.ts.net  (comma-separated for multiple).
      - OPENCLAW_CONTROL_UI_ALLOWED_ORIGINS=${OPENCLAW_CONTROL_UI_ALLOWED_ORIGINS:-}
      # Optional extra provider keys / bot tokens (set in .env if used):
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    volumes:
      - ./config:/config
    ports:
      - 18789:18789
    restart: unless-stopped
